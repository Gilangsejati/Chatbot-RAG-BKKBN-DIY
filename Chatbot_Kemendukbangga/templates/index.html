<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chatbot FAQ</title>

  <!-- stylesheet -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <div id="app">

    <!-- ================= SIDEBAR ================= -->
    <aside id="sidebar" aria-label="Sidebar">

      <h2>Kategori Pertanyaan</h2>

      <!-- Scroll wrapper untuk kategori (HANYA untuk pills) -->
      <div class="pills-scroll" aria-hidden="false">
        <div id="category-pills" class="pills-container" role="tablist" aria-label="Daftar kategori">
          <!-- kategori akan di-render oleh app.js -->
        </div>
      </div>

      <!-- (Optional legacy) tetap disembunyikan -->
      <div id="question-list" class="question-list" style="display:none;" aria-hidden="true"></div>

      <!-- ============ FIXED BUTTON: HUBUNGI ADMIN (TIDAK ikut scroll) ============ -->
      <div id="admin-contact-widget">
        <a id="admin-wa-link"
           href="https://wa.me/{{ admin_wa|replace('+','') }}"
           target="_blank" rel="noopener noreferrer">
          Hubungi Admin
        </a>
      </div>

    </aside>

    <!-- ================= CHAT PANEL ================= -->
    <main id="chat-panel" role="main">

      <header>
        <div>
          <h1 class="site-title">Bot KemendukBangga</h1>
          <p class="subtitle">Tanyakan seputar FAQ.</p>
        </div>
        <div id="status" aria-live="polite">
          <span class="online-dot" aria-hidden="true"></span>
          <span id="health">online</span>
        </div>
      </header>

      <!-- Chat Messages -->
      <section id="messages" class="messages" aria-live="polite"></section>

      <!-- Composer: input + send (ikon) -->
      <form id="composer" autocomplete="off" role="search">
        <input id="inputText" type="text" placeholder="Ketik pertanyaan atau pilih FAQ..." aria-label="Tulis pertanyaan" />
        <button id="sendBtn" class="btn-circle btn-send" type="submit" title="Kirim" aria-label="Kirim">
          <img src="{{ url_for('static', filename='send.svg') }}" alt="send" class="send-icon" />
        </button>
      </form>

    </main>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}" defer></script>
</body>
</html>
